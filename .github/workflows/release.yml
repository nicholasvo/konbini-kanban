name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must equal manifest version, no 'v'). Leave blank to use manifest.json."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/}" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="$(node -p "require('./manifest.json').version")"
          fi

          # On manual runs the tag may not exist yet; create it at this commit.
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
